server:
  port: ${SERVER_PORT:8075}

spring:
  application:
    name: im-server
  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: ${SPRING_DATASOURCE_URL:jdbc:mysql://127.0.0.1:3306/im_server?useUnicode=true&characterEncoding=UTF-8&connectionCollation=utf8mb4_unicode_ci&serverTimezone=Asia/Shanghai&useSSL=false&allowPublicKeyRetrieval=true}
    username: ${SPRING_DATASOURCE_USERNAME:root}
    password: ${SPRING_DATASOURCE_PASSWORD:}
  data:
    redis:
      host: ${SPRING_DATA_REDIS_HOST:127.0.0.1}
      port: ${SPRING_DATA_REDIS_PORT:6379}
      database: ${SPRING_DATA_REDIS_DATABASE:0}
      password: ${SPRING_DATA_REDIS_PASSWORD:}
      timeout: 5s
  servlet:
    multipart:
      max-file-size: 200MB
      max-request-size: 200MB
  jackson:
    default-property-inclusion: non_null
  mail:
    host: ${MAIL_HOST:smtp.gmail.com}
    port: ${MAIL_PORT:587}
    username: ${MAIL_USERNAME:}
    password: ${MAIL_PASSWORD:}
    default-encoding: UTF-8
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true
        transport:
          protocol: smtp
        debug: false

logging:
  level:
    com.im.server: INFO
    com.im.server.common.GlobalExceptionHandler: WARN

mybatis-plus:
  configuration:
    map-underscore-to-camel-case: true
    log-impl: org.apache.ibatis.logging.slf4j.Slf4jImpl
  global-config:
    db-config:
      id-type: assign_id

springdoc:
  swagger-ui:
    path: /swagger-ui.html

app:
  agora:
    enabled: ${AGORA_ENABLED:true}
    app-id: ${AGORA_APP_ID:}
    app-certificate: ${AGORA_APP_CERTIFICATE:}
    rtc-token-expire-seconds: ${AGORA_RTC_TOKEN_EXPIRE_SECONDS:3600}
    session-ttl-seconds: ${AGORA_SESSION_TTL_SECONDS:7200}
    ring-timeout-seconds: ${AGORA_RING_TIMEOUT_SECONDS:45}
  rate-limit:
    enabled: true
    general-per-minute: 240
    auth-ip-per-minute: 45
    search-per-minute: 60
  jwt:
    secret: ${JWT_SECRET:dev-local-only-secret-min-32-chars!!}
    access-token-expire-seconds: ${JWT_ACCESS_TOKEN_EXPIRE_SECONDS:86400}
    refresh-token-expire-seconds: ${JWT_REFRESH_TOKEN_EXPIRE_SECONDS:2592000}
  auth:
    verify-on-register: false
    phone-auth-enabled: false
    code-ttl-seconds: 300
    send-code-min-interval-seconds: 60
    verify-code-log: true
    verify-email-subject: IM 验证码
    sms-stub-mode: true
    sms-webhook:
      enabled: false
  minio:
    endpoint: ${MINIO_ENDPOINT:http://127.0.0.1:9000}
    access-key: ${MINIO_ACCESS_KEY:}
    secret-key: ${MINIO_SECRET_KEY:}
    bucket: ${MINIO_BUCKET:im-media}
  websocket:
    allowed-origins:
      - ${WEBSOCKET_ALLOWED_ORIGIN:*}
    relay:
      enabled: ${WS_STOMP_RELAY_ENABLED:false}
      host: ${RABBITMQ_STOMP_HOST:127.0.0.1}
      port: ${RABBITMQ_STOMP_PORT:61613}
      client-login: ${RABBITMQ_STOMP_CLIENT_LOGIN:guest}
      client-passcode: ${RABBITMQ_STOMP_CLIENT_PASSCODE:guest}
      system-login: ${RABBITMQ_STOMP_SYSTEM_LOGIN:guest}
      system-passcode: ${RABBITMQ_STOMP_SYSTEM_PASSCODE:guest}
    rate-limit:
      enabled: true
      send-per-minute: ${WS_STOMP_SEND_PER_MINUTE:120}
      typing-per-minute: ${WS_STOMP_TYPING_PER_MINUTE:90}
      deliver-per-minute: ${WS_STOMP_DELIVER_PER_MINUTE:180}
  push:
    webhook-url: ${PUSH_WEBHOOK_URL:}
