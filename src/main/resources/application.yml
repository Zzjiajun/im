server:
  port: ${SERVER_PORT:8075}

spring:
  application:
    name: im-server
  autoconfigure:
    exclude:
  flyway:
    # 启用 Flyway 数据库迁移
    enabled: ${FLYWAY_ENABLED:false}
    # 基线版本：如果已有数据库且表已存在，设置 baseline-on-migrate: true
    baseline-on-migrate: ${FLYWAY_BASELINE:true}
    # 基线条目版本号（默认为 1，表示已有数据库是 V1 之前的状态）
    baseline-version: ${FLYWAY_BASELINE_VERSION:0}
    # 迁移脚本位置
    locations: classpath:db/migration
    # 不要清理数据库
    clean-disabled: true
    # 非严格模式：允许已存在的表
    validate-on-migrate: true
  elasticsearch:
    # ES 服务地址：设置此值则启用 ES，留空则不启用（降级为 MySQL LIKE 搜索）
    uris: ${ES_URIS:http://47.84.185.140:9200}
    # 连接超时（Duration 格式）
    connection-timeout: ${ES_CONNECT_TIMEOUT:10s}
    # 读取超时（Duration 格式）
    socket-timeout: ${ES_SOCKET_TIMEOUT:30s}
  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: jdbc:mysql://127.0.0.1:3306/im_server?useUnicode=true&characterEncoding=UTF-8&connectionCollation=utf8mb4_unicode_ci&serverTimezone=Asia/Shanghai&useSSL=false&allowPublicKeyRetrieval=true
    username: root
    password: 123456
  data:
    redis:
      host: 127.0.0.1
      port: 6379
      database: 0
      timeout: 5s
  servlet:
    multipart:
      max-file-size: 200MB
      max-request-size: 200MB
  jackson:
    default-property-inclusion: non_null
  mail:
    host: smtp.gmail.com
    port: 587
    username: 1848875071j@gmail.com
    password: yjvb pfmv fcay fvjh
    default-encoding: UTF-8
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true
        transport:
          protocol: smtp
        debug: false

logging:
  level:
    com.im.server: INFO
    com.im.server.common.GlobalExceptionHandler: WARN

mybatis-plus:
  configuration:
    map-underscore-to-camel-case: true
    log-impl: org.apache.ibatis.logging.slf4j.Slf4jImpl
  global-config:
    db-config:
      id-type: assign_id

springdoc:
  swagger-ui:
    path: /swagger-ui.html

management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus,metrics
      base-path: /actuator
  endpoint:
    health:
      show-details: when-authorized
      show-components: when-authorized
    prometheus:
      enabled: true
  metrics:
    tags:
      application: ${spring.application.name}
  prometheus:
    metrics:
      export:
        enabled: true

app:
  elasticsearch:
    # ES 索引名（与 init-es.sh 中的 INDEX_NAME 保持一致）
    index: ${ES_INDEX:im_messages_v1}
    # ES 搜索断路器配置
    circuit-breaker:
      failure-threshold: ${ES_CB_FAILURE_THRESHOLD:5}
      cooldown-millis: ${ES_CB_COOLDOWN_MILLIS:30000}
  agora:
    enabled: ${AGORA_ENABLED:true}
    app-id: 9b130e61e2104c9d86992681d4005a43
    app-certificate: e99531508a244dcfb145f168255c879a
    rtc-token-expire-seconds: ${AGORA_RTC_TOKEN_EXPIRE_SECONDS:3600}
    session-ttl-seconds: ${AGORA_SESSION_TTL_SECONDS:7200}
    ring-timeout-seconds: ${AGORA_RING_TIMEOUT_SECONDS:45}
  rate-limit:
    enabled: true
    general-per-minute: 240
    auth-ip-per-minute: 45
    search-per-minute: 60
  jwt:
    secret: ${JWT_SECRET:dev-local-only-secret-min-32-chars!!}
    access-token-expire-seconds: ${JWT_ACCESS_TOKEN_EXPIRE_SECONDS:86400}
    refresh-token-expire-seconds: ${JWT_REFRESH_TOKEN_EXPIRE_SECONDS:2592000}
  auth:
    verify-on-register: true
    phone-auth-enabled: false
    auto-register-on-code-login: true
    code-ttl-seconds: 300
    send-code-min-interval-seconds: 60
    verify-code-log: true
    verify-email-subject: IM 验证码
    sms-stub-mode: true
    unimatrix-sms:
      enabled: ${UNIMATRIX_SMS_ENABLED:false}
      access-key-id: ${UNIMATRIX_ACCESS_KEY_ID:JK6grKJY5byczq8pMSeZLT}
      access-key-secret: ${UNIMATRIX_ACCESS_KEY_SECRET:PsgzzVYBhYvZgZMywkF8oBWBEPVEWN}
      content-template: ${UNIMATRIX_SMS_CONTENT_TEMPLATE:您的验证码是{code}，{ttlMinutes}分钟内有效。}
    aliyun-sms:
      enabled: ${ALIYUN_SMS_ENABLED:false}
      access-key-id: ${ALIYUN_SMS_ACCESS_KEY_ID:}
      access-key-secret: ${ALIYUN_SMS_ACCESS_KEY_SECRET:}
      sign-name: ${ALIYUN_SMS_SIGN_NAME:}
      template-code: ${ALIYUN_SMS_TEMPLATE_CODE:}
    sms-webhook:
      enabled: false
  minio:
    endpoint: http://47.89.251.203:9000
    access-key: 2Q73HLqewqURe0IAb7L8
    secret-key: 3nnke3XxJJglzxUMtUu7U9Vb4DOTZgXIqb3LydnT
    bucket: ${MINIO_BUCKET:im-media}
  websocket:
    allowed-origins:
      - ${WEBSOCKET_ALLOWED_ORIGIN:*}
    relay:
      enabled: ${WS_STOMP_RELAY_ENABLED:false}
