server:
  port: 8075

spring:
  application:
    name: im-server
  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: jdbc:mysql://127.0.0.1:3306/im_server?useUnicode=true&characterEncoding=UTF-8&connectionCollation=utf8mb4_unicode_ci&serverTimezone=Asia/Shanghai&useSSL=false&allowPublicKeyRetrieval=true
    username: im
    password: im
  data:
    redis:
      host: 127.0.0.1
      port: 6379
      database: 0
      timeout: 5s

app:
  jwt:
    # 开发环境请替换为至少 32 字符的随机字符串
    secret: dev-local-only-secret-min-32-chars!!
  elasticsearch:
    index: im_messages_v1
  agora:
    enabled: false
    app-id: ""
    app-certificate: ""
  minio:
    endpoint: ""
    access-key: ""
    secret-key: ""
    bucket: im-media
  push:
    webhook-url: ""
# 复制为 application-local.yml（勿提交仓库），用于本机覆盖敏感配置
spring:
  datasource:
    password: your-mysql-password
  mail:
    username: your@email.com
    password: your-app-password

app:
  jwt:
    secret: replace-with-long-random-secret-at-least-32-chars
  auth:
    phone-auth-enabled: true
    auto-register-on-code-login: true
    sms-stub-mode: false
    unimatrix-sms:
      enabled: true
      access-key-id: your-unimatrix-access-key-id
      access-key-secret: your-unimatrix-access-key-secret
      endpoint: https://api-cn.unimtx.com
      signature: your-sms-signature
      template-id: your-template-id
      content-template: "您的验证码是{code}，{ttlMinutes}分钟内有效。"
  minio:
    endpoint: http://127.0.0.1:9000
    access-key: minio-access
    secret-key: minio-secret
